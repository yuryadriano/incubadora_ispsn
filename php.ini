; PHP Configuration for Incubadora ISPSN
; Prevents 504 Gateway Timeout errors

; Limit script execution time (Cloudflare times out at 100s, set PHP lower)
max_execution_time = 30

; Input/output limits
max_input_time = 30
default_socket_timeout = 5

; Memory
memory_limit = 128M

; Error handling (production - log errors, don't display)
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Upload limits
upload_max_filesize = 10M
post_max_size = 12M

; Session
session.gc_maxlifetime = 3600
session.cookie_httponly = 1
session.cookie_samesite = Lax
